# ModSecurity Rule: Block Bad Bots and Crawlers
# Rule ID: 777007
# Location: /etc/modsecurity.d/777007_block_badbots.conf
# Managed by: modsec-bot-monitor service
# Do not edit manually — use install.sh to deploy if exist

SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i)(?:AhrefsBot|Baiduspider|BLEXBot|Barkrowler|SemrushBot|ClaudeBot|YandexBot|Bytespider|AliyunSecBot|BingBot|Mb2345Browser|LieBaoFast|MicroMessenger|Kinza|Datanyze|serpstatbot|spaziodati|AspiegelBot|PetalBot|meta-externalagent|meta-webindexer|ImagesiftBot|Amazonbot|DotBot|GPTBot|MJ12Bot|CCBot|DuckDuckBot|Facebot|FacebookBot|Twitterbot|Slackbot|Discordbot|Sogou\sSpider|Exabot|Applebot|LinkedInBot|Siteimprove|ZoominfoBot|Scrapy|DataForSeoBot|MauiBot|Neevabot|PerplexityBot|anthropic-ai|cohere-ai|Pinterestbot|Timpibot|magpie-crawler|python-requests|python-httpx|Go-http-client|curl\/|wget\/|libwww-perl|Java\/|okhttp)" \
    "id:777007,\
    phase:1,\
    block,\
    status:403,\
    log,\
    msg:'Blocked Bad Bot: %{REQUEST_HEADERS.User-Agent} on %{REQUEST_HEADERS.Host}',\
    logdata:'Matched UA: %{REQUEST_HEADERS.User-Agent}',\
    severity:'WARNING',\
    tag:'BADBOT',\
    tag:'CRAWLER'"
