# Rule ID 777007: Block Bad Bots and Crawlers based on User-Agent
# This rule targets known malicious/scraping bots. Place in /etc/modsecurity.d/

SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(?:AhrefsBot|Baiduspider|BLEXBot|Barkrowler|SemrushBot|ClaudeBot|YandexBot|Bytespider|AliyunSecBot|BingBot|Mb2345Browser|LieBaoFast|MicroMessenger|Kinza|Datanyze|serpstatbot|spaziodati|AspiegelBot|PetalBot|meta-externalagent|meta-webindexer|ImagesiftBot|Amazonbot|DotBot|GPTBot|MJ12Bot|CCBot|DuckDuckBot|Facebot|Twitterbot|Slackbot|Discordbot|Sogou\sSpider|Exabot|Applebot|LinkedInBot|Siteimprove|ZoominfoBot)" "msg:'Bad Bot Blocked on host %{REQUEST_HEADERS.Host}',phase:1,log,id:777007,t:none,block,status:403"
